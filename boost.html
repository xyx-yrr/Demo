<!DOCTYPE html>
<html>

<head>

    <title>Simple Dashboard</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- Sidebar -->

        <div class="col-md-2 bg-dark text-white vh-100 p-3">

            <h3>Dashboard</h3>

            <hr>

            <p>Home</p>

            <p>Students</p>

            <p>Courses</p>

            <p>Exams</p>

            <p>Logout</p>

        </div>


        <!-- Main Content -->

        <div class="col-md-10 p-4">

            <h2>Admin Dashboard</h2>

            <div class="row mt-4">

                <!-- Card 1 -->

                <div class="col-md-3">

                    <div class="card bg-primary text-white p-3">

                        <h4>Students</h4>

                        <h2>1200</h2>

                    </div>

                </div>


                <!-- Card 2 -->

                <div class="col-md-3">

                    <div class="card bg-success text-white p-3">

                        <h4>Courses</h4>

                        <h2>35</h2>

                    </div>

                </div>


                <!-- Card 3 -->

                <div class="col-md-3">

                    <div class="card bg-warning p-3">

                        <h4>Exams</h4>

                        <h2>18</h2>

                    </div>

                </div>


                <!-- Card 4 -->

                <div class="col-md-3">

                    <div class="card bg-danger text-white p-3">

                        <h4>Fees</h4>

                        <h2>75K</h2>

                    </div>

                </div>

            </div>


            <!-- Table -->

            <div class="mt-5">

                <h3>Student Records</h3>

                <table class="table table-bordered">

                    <tr class="table-dark">

                        <th>ID</th>
                        <th>Name</th>
                        <th>Course</th>

                    </tr>

                    <tr>

                        <td>101</td>
                        <td>Rahul</td>
                        <td>IT</td>

                    </tr>

                    <tr>

                        <td>102</td>
                        <td>Priya</td>
                        <td>BCA</td>

                    </tr>

                </table>

            </div>

        </div>

    </div>

</div>

</body>

</html>
