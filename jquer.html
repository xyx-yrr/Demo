<!DOCTYPE html>
<html>

<head>

    <title>jQuery Mobile Website</title>

    <!-- jQuery Mobile CSS -->
    <link rel="stylesheet"
    href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>

    <!-- jQuery Mobile JS -->
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

</head>

<body>

<!-- HOME PAGE -->

<div data-role="page" id="home">

    <!-- HEADER -->

    <div data-role="header">

        <h1>My Mobile Website</h1>

    </div>

    <!-- CONTENT -->

    <div data-role="content">

        <h2>Welcome</h2>

        <p>
            This is a simple mobile website
            using jQuery Mobile.
        </p>

        <a href="#about"
        data-role="button">

            Go To About Page

        </a>

    </div>

    <!-- FOOTER -->

    <div data-role="footer">

        <h4>Home Footer</h4>

    </div>

</div>


<!-- ABOUT PAGE -->

<div data-role="page" id="about">

    <!-- HEADER -->

    <div data-role="header">

        <h1>About Page</h1>

    </div>

    <!-- CONTENT -->

    <div data-role="content">

        <h2>About Us</h2>

        <p>
            This website is developed
            using jQuery Mobile.
        </p>

        <a href="#home"
        data-role="button">

            Back To Home

        </a>

    </div>

    <!-- FOOTER -->

    <div data-role="footer">

        <h4>About Footer</h4>

    </div>

</div>

</body>
</html>
